name: CI

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20s
      - run: npm install
      - run: npm test

  dotnet-coverage:
    name: .NET Tests + Coverage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'
      - name: Run tests and generate coverage
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./.scripts/test-coverage.ps1
      - name: Upload coverage HTML reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: src/Pulse.Tests/TestResults/**/coverage-report